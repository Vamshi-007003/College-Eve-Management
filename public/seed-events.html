function log(msg, type = 'inf') {
    const logEl = document.getElementById('log');
    logEl.style.display = 'block';
    const line = document.createElement('div');
    line.className = `log-line log-${type}`;
    line.textContent = msg;
    logEl.appendChild(line);
    logEl.scrollTop = logEl.scrollHeight;
}

function setProgress(pct) {
    document.getElementById('progressFill').style.width = pct + '%';
}

window.startSeed = async function() {
    const btn = document.getElementById('seedBtn');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span> Seeding events...';

    // Check auth
    const user = JSON.parse(localStorage.getItem('user_data') || 'null');
    if (!user || user.role !== 'admin') {
        alert('You must be logged in as admin first!\n\nGo to /index.html and log in as admin, then come back here.');
        btn.disabled = false;
        btn.innerHTML = '🚀 Seed All Events Now';
        return;
    }

    log(`✅ Logged in as admin: ${user.name}`, 'ok');
    log(`📦 Seeding ${EVENTS.length} events...`, 'inf');

    let success = 0;
    let failed = 0;

    for (let i = 0; i < EVENTS.length; i++) {
        const ev = EVENTS[i];
        try {
            await addDoc(collection(db, 'events'), {
                ...ev,
                createdBy: user.uid,
                createdAt: serverTimestamp()
            });
            success++;
            log(`✅ [${i+1}/${EVENTS.length}] ${ev.title}`, 'ok');
        } catch (err) {
            failed++;
            log(`❌ [${i+1}/${EVENTS.length}] FAILED: ${ev.title} — ${err.message}`, 'err');
        }
        setProgress(Math.round(((i + 1) / EVENTS.length) * 100));
        // Small delay to avoid Firestore rate limits
        await new Promise(r => setTimeout(r, 120));
    }

    log(`\n🎉 Done! ${success} events added, ${failed} failed.`, 'ok');
    setProgress(100);
    btn.style.display = 'none';
    document.getElementById('doneMsg').style.display = 'block';
};
