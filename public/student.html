<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Dashboard - ColEvent</title>
    <meta name="description" content="Browse events, register, and manage your event tickets">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>

    <script>
        // ===== GLOBAL FUNCTIONS — defined synchronously, before anything else =====
        function switchTab(tabId, btn) {
            document.querySelectorAll('.tab-content').forEach(function(t) { t.classList.remove('active'); });
            var el = document.getElementById(tabId);
            if (el) el.classList.add('active');
            document.querySelectorAll('.sidebar .tab-btn').forEach(function(b) { b.classList.remove('active'); });
            if (btn) btn.classList.add('active');
        }
        function openModal(id) { var el = document.getElementById(id); if (el) el.classList.add('active'); }
        function closeModal(id) { var el = document.getElementById(id); if (el) el.classList.remove('active'); }
        function loadEvents() { if (window._loadEvents) window._loadEvents(); }
        function loadMyRegistrations() { if (window._loadMyRegistrations) window._loadMyRegistrations(); }
        function loadNotifications() { if (window._loadNotifications) window._loadNotifications(); }
        function startRegistration(id) { if (window._startRegistration) window._startRegistration(id); }
        function handleRegistration() { if (window._handleRegistration) window._handleRegistration(); }
        function viewQR(a,b,c) { if (window._viewQR) window._viewQR(a,b,c); }
        function downloadCurrentQR() { if (window._downloadCurrentQR) window._downloadCurrentQR(); }
    </script>

    <nav class="navbar">
        <div class="container">
            <div class="nav-brand"><span>🎓</span> ColEvent Student</div>
            <div class="nav-right">
                <span class="nav-user" id="studentName"></span>
                <button class="btn btn-outline btn-sm" id="logoutBtn">Logout</button>
            </div>
        </div>
    </nav>

    <div class="dashboard-layout">
        <div class="sidebar">
            <div class="sidebar-header"><h3>Navigation</h3></div>
            <button class="tab-btn active" onclick="switchTab('upcoming-events', this); loadEvents();">
                <span class="tab-icon">📅</span> Events
            </button>
            <button class="tab-btn" onclick="switchTab('my-registrations', this); loadMyRegistrations();">
                <span class="tab-icon">🎟️</span> My Tickets
            </button>
            <button class="tab-btn" onclick="switchTab('notifications', this); loadNotifications();">
                <span class="tab-icon">🔔</span> Notifications
            </button>
        </div>

        <div class="main-content">
            <!-- Upcoming Events -->
            <div id="upcoming-events" class="tab-content active">
                <div class="section-header"><h2>Available Events</h2></div>
                <div class="grid-2" id="studentEventsList">
                    <div class="loading-overlay"><span class="spinner"></span> Loading events...</div>
                </div>
            </div>

            <!-- My Registrations -->
            <div id="my-registrations" class="tab-content">
                <div class="section-header"><h2>My Tickets</h2></div>
                <div id="myRegistrationsList">
                    <div class="loading-overlay"><span class="spinner"></span> Loading tickets...</div>
                </div>
            </div>

            <!-- Notifications -->
            <div id="notifications" class="tab-content">
                <div class="section-header"><h2>Notifications</h2></div>
                <div class="card" style="padding:0;">
                    <div id="studentNotificationsList">
                        <div class="loading-overlay"><span class="spinner"></span> Loading...</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Registration Modal -->
    <div id="regModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>🎟️ Event Registration</h3>
                <button class="close-modal" onclick="closeModal('regModal')">×</button>
            </div>
            <div class="modal-body">
                <div class="payment-info-box">
                    <h4 id="rm_title">Event Title</h4>
                    <p class="text-muted mb-2" id="rm_date"></p>
                    <div class="amount" id="rm_fee">₹0</div>
                </div>
                <div id="paymentSection">
                    <p class="text-muted mb-4" style="font-size:0.82rem;">
                        🎟️ Confirm your registration for this event.
                    </p>
                </div>
                <button type="button" id="regSubmitBtn" class="btn btn-primary btn-block btn-lg" onclick="handleRegistration()">
                    Confirm Registration
                </button>
                <p class="text-center text-muted mt-4" style="font-size:0.75rem;">🔒 Secured by Firebase</p>
            </div>
        </div>
    </div>

    <!-- QR Code Modal -->
    <div id="qrModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>🎫 Your Ticket</h3>
                <button class="close-modal" onclick="closeModal('qrModal')">×</button>
            </div>
            <div class="modal-body" style="text-align:center;">
                <div class="qr-ticket" id="qrDisplay">
                    <div id="qrCodeContainer" style="display:inline-block; margin-bottom:1rem;"></div>
                    <div class="qr-ticket-info" id="qrInfo"></div>
                </div>
                <div style="margin-top:1.5rem; display:flex; gap:0.75rem; justify-content:center;">
                    <button class="btn btn-primary" onclick="downloadCurrentQR()">📥 Download QR</button>
                </div>
            </div>
        </div>
    </div>

    <!-- QRCode.js library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

    <script type="module">
        import { db } from '/js/firebase-config.js';
        import { Auth } from '/js/auth.js';
        import { showToast, formatDate, formatCurrency, timeAgo, escapeHtml, openModal, closeModal, switchTab, downloadQR } from '/js/utils.js';
        import { collection, getDocs, getDoc, doc, addDoc, updateDoc, query, orderBy, where, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

        // Expose module functions globally
        window.showToast      = showToast;
        window.escapeHtml     = escapeHtml;
        window.formatDate     = formatDate;
        window.formatCurrency = formatCurrency;
        window.timeAgo        = timeAgo;
        window.escapeHtml     = escapeHtml;
        window.formatDate     = formatDate;
        window.formatCurrency = formatCurrency;
        window.timeAgo        = timeAgo;

        const user = Auth.requireAuth('student');
        if (user) {
            document.getElementById('studentName').textContent = user.name;
        }
        document.getElementById('logoutBtn').onclick = () => Auth.logout();

        let currentRegEvent = null;
        let currentQRBase64 = null;

        // ========== LOAD EVENTS ==========
        window._loadEvents = async function() {
            try {
                // Get all events without orderBy to avoid needing index
                const eventsSnap = await getDocs(collection(db, 'events'));
                const list = document.getElementById('studentEventsList');
                list.innerHTML = '';

                if (eventsSnap.empty) {
                    list.innerHTML = `<div class="empty-state" style="grid-column:1/-1;">
                        <div class="empty-state-icon">📅</div><h3>No Events Available</h3>
                        <p>Check back later for upcoming events.</p></div>`;
                    return;
                }

                // Get my registrations
                const myRegsSnap = await getDocs(query(collection(db, 'registrations'), where('studentId', '==', user.uid)));
                const myEventIds = new Set(myRegsSnap.docs.map(d => d.data().eventId));

                eventsSnap.forEach(evDoc => {
                    const ev = { id: evDoc.id, ...evDoc.data() };
                    const isRegistered = myEventIds.has(ev.id);
                    const isFull = ev.seatsLeft <= 0;
                    const dueDate = ev.dueDate?.toDate ? ev.dueDate.toDate() : new Date(ev.dueDate);
                    const startDate = ev.startDate?.toDate ? ev.startDate.toDate() : new Date(ev.startDate);
                    const isPastDue = dueDate < new Date();
                    const isNotOpenYet = startDate > new Date();

                    let actionBtn = '';
                    if (isRegistered) {
                        actionBtn = `<button class="btn btn-outline btn-block" disabled>✅ Already Registered</button>`;
                    } else if (isNotOpenYet) {
                        actionBtn = `<button class="btn btn-outline btn-block" style="border-color:var(--warning);color:var(--warning);" disabled>⏳ Opens: ${formatDate(ev.startDate)}</button>`;
                    } else if (isFull) {
                        actionBtn = `<button class="btn btn-danger btn-block" disabled>Sold Out</button>`;
                    } else if (isPastDue) {
                        actionBtn = `<button class="btn btn-outline btn-block" disabled>Registration Closed</button>`;
                    } else {
                        actionBtn = `<button class="btn btn-primary btn-block" onclick="startRegistration('${ev.id}')">Register Now</button>`;
                    }

                    const bannerHtml = ev.imageUrl
                        ? `<img src="${ev.imageUrl}" class="event-image" style="border-radius:var(--radius-lg) var(--radius-lg) 0 0;" onerror="this.style.display='none'">`
                        : `<div class="event-image" style="border-radius:var(--radius-lg) var(--radius-lg) 0 0;">📸</div>`;

                    list.innerHTML += `
                        <div class="event-card">
                            ${bannerHtml}
                            <div class="event-content">
                                <div class="event-title">${escapeHtml(ev.title)}</div>
                                <div class="event-desc">${escapeHtml(ev.description)}</div>
                                <div class="event-meta">
                                    <span>📅 ${formatDate(ev.eventDate)}</span>
                                    <span class="badge ${isFull ? 'badge-danger' : 'badge-success'}">${ev.seatsLeft} Seats Left</span>
                                </div>
                                <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem;">
                                    <span class="event-price">${ev.entryFee > 0 ? formatCurrency(ev.entryFee) : 'Free'}</span>
                                    <span class="event-due">Due: ${formatDate(ev.dueDate)}</span>
                                </div>
                                ${actionBtn}
                            </div>
                        </div>`;
                });
            } catch (error) {
                console.error('Load events error:', error);
                document.getElementById('studentEventsList').innerHTML =
                    '<div class="empty-state" style="grid-column:1/-1;"><div class="empty-state-icon">⚠️</div><h3>Failed to load events</h3></div>';
            }
        };

        // ========== START REGISTRATION ==========
        window._startRegistration = async function(eventId) {
            try {
                const evDoc = await getDoc(doc(db, 'events', eventId));
                if (!evDoc.exists()) return;
                currentRegEvent = { id: evDoc.id, ...evDoc.data() };

                document.getElementById('rm_title').textContent = currentRegEvent.title;
                document.getElementById('rm_date').textContent = '📅 ' + formatDate(currentRegEvent.eventDate);

                const isFree = !currentRegEvent.entryFee || currentRegEvent.entryFee === 0;
                const paymentSection = document.getElementById('paymentSection');
                const btn = document.getElementById('regSubmitBtn');

                if (isFree) {
                    paymentSection.style.display = 'none';
                    document.getElementById('rm_fee').textContent = 'Free Event';
                    document.getElementById('rm_fee').style.color = 'var(--accent-success)';
                    btn.innerHTML = '🎟️ Confirm Registration';
                } else {
                    paymentSection.style.display = 'block';
                    document.getElementById('rm_fee').textContent = formatCurrency(currentRegEvent.entryFee);
                    document.getElementById('rm_fee').style.color = '';
                    btn.innerHTML = `🎟️ Confirm Registration (${formatCurrency(currentRegEvent.entryFee)})`;
                }

                openModal('regModal');
            } catch (error) {
                showToast('Failed to load event details', 'error');
            }
        };

        // ========== HANDLE REGISTRATION ==========
        window._handleRegistration = async function() {
            if (!currentRegEvent) return;
            const btn = document.getElementById('regSubmitBtn');
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner"></span> Processing...';

            try {
                // Check duplicate — fetch by studentId only to avoid needing composite index
                const dupSnap = await getDocs(query(
                    collection(db, 'registrations'),
                    where('studentId', '==', user.uid)
                ));
                const alreadyRegistered = dupSnap.docs.some(d => d.data().eventId === currentRegEvent.id);
                if (alreadyRegistered) {
                    throw new Error('Already registered for this event.');
                }

                // Check seats
                const evDoc = await getDoc(doc(db, 'events', currentRegEvent.id));
                const ev = evDoc.data();
                if (ev.seatsLeft <= 0) throw new Error('Event is sold out.');

                // Create registration
                const regData = {
                    eventId: currentRegEvent.id,
                    studentId: user.uid,
                    studentName: user.name,
                    studentEmail: user.email,
                    studentDept: user.department || '',
                    amount: currentRegEvent.entryFee || 0,
                    paymentStatus: currentRegEvent.entryFee > 0 ? 'paid' : 'free',
                    qrUsed: false,
                    qrUsedAt: null,
                    createdAt: serverTimestamp()
                };

                const regRef = await addDoc(collection(db, 'registrations'), regData);

                // Generate QR payload (encode registration info)
                const qrPayload = btoa(JSON.stringify({
                    r: regRef.id,
                    e: currentRegEvent.id,
                    s: user.uid
                }));
                await updateDoc(regRef, { qrData: qrPayload });

                // Update seats left
                await updateDoc(doc(db, 'events', currentRegEvent.id), {
                    seatsLeft: ev.seatsLeft - 1
                });

                showToast('Registration successful! 🎉', 'success');
                closeModal('regModal');
                loadEvents();
                loadMyRegistrations();
            } catch (error) {
                showToast(error.message, 'error');
            } finally {
                btn.disabled = false;
                const isFree = !currentRegEvent?.entryFee || currentRegEvent.entryFee === 0;
                btn.innerHTML = isFree ? '🎟️ Confirm Registration' : `🎟️ Confirm Registration (${formatCurrency(currentRegEvent?.entryFee || 0)})`;
            }
        };

        // ========== LOAD MY REGISTRATIONS ==========
        window._loadMyRegistrations = async function() {
            try {
                // Simple where-only query — no composite index needed
                const regsSnap = await getDocs(query(
                    collection(db, 'registrations'),
                    where('studentId', '==', user.uid)
                ));
                const list = document.getElementById('myRegistrationsList');
                list.innerHTML = '';

                if (regsSnap.empty) {
                    list.innerHTML = `<div class="empty-state">
                        <div class="empty-state-icon">🎟️</div>
                        <h3>No Tickets Yet</h3>
                        <p>Register for events to see your tickets here.</p></div>`;
                    return;
                }

                for (const regDoc of regsSnap.docs) {
                    const reg = { id: regDoc.id, ...regDoc.data() };
                    const evDoc = await getDoc(doc(db, 'events', reg.eventId));
                    const ev = evDoc.exists() ? evDoc.data() : null;

                    const isFree = reg.paymentStatus === 'free';
                    const paymentBadge = isFree
                        ? `<span class="badge badge-info">Free Event</span>`
                        : `<span class="badge badge-success">Paid ✓</span>`;
                    const qrUsedBadge = reg.qrUsed
                        ? `<span class="badge badge-warning">Ticket Used</span>`
                        : `<span class="badge badge-success">Ticket Active</span>`;

                    list.innerHTML += `
                        <div class="reg-card">
                            <div class="reg-info">
                                <h3>${escapeHtml(ev?.title || 'Event')}</h3>
                                <p>📅 ${formatDate(ev?.eventDate)} &nbsp;•&nbsp; Registered: ${reg.createdAt ? timeAgo(reg.createdAt) : 'Just now'}</p>
                            </div>
                            <div class="reg-actions">
                                ${paymentBadge}
                                ${qrUsedBadge}
                                <button class="btn btn-primary btn-sm" onclick="viewQR('${reg.id}', '${escapeHtml(ev?.title || '')}', '${reg.qrData || ''}')">
                                    🎫 View QR
                                </button>
                            </div>
                        </div>`;
                }
            } catch (error) {
                console.error('Load registrations error:', error);
            }
        };

        // ========== VIEW QR ==========
        window._viewQR = function(regId, eventTitle, qrData) {
            if (!qrData) { showToast('QR code not available', 'error'); return; }
            currentQRBase64 = null;
            document.getElementById('qrInfo').textContent = eventTitle;

            const container = document.getElementById('qrCodeContainer');
            container.innerHTML = '';
            const qrDiv = document.createElement('div');
            container.appendChild(qrDiv);

            const qr = new QRCode(qrDiv, {
                text: qrData,
                width: 250,
                height: 250,
                colorDark: '#000000',
                colorLight: '#ffffff',
                correctLevel: QRCode.CorrectLevel.H
            });

            // Store canvas reference for download
            setTimeout(() => {
                const canvas = container.querySelector('canvas');
                if (canvas) currentQRBase64 = canvas.toDataURL('image/png');
            }, 200);

            openModal('qrModal');
        };

        window._downloadCurrentQR = function() {
            if (currentQRBase64) {
                downloadQR(currentQRBase64, 'event-ticket-qr.png');
            } else {
                const canvas = document.querySelector('#qrCodeContainer canvas');
                if (canvas) downloadQR(canvas.toDataURL('image/png'), 'event-ticket-qr.png');
            }
        };

        // ========== NOTIFICATIONS ==========
        window._loadNotifications = async function() {
            try {
                // No orderBy — avoids composite index requirement. Sort client-side instead.
                const snap = await getDocs(collection(db, 'notifications'));
                const list = document.getElementById('studentNotificationsList');
                list.innerHTML = '';

                if (snap.empty) {
                    list.innerHTML = '<div class="empty-state"><div class="empty-state-icon">🔔</div><h3>No notifications</h3></div>';
                    return;
                }

                // Sort newest first client-side
                const notifications = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                notifications.sort((a, b) => {
                    const ta = a.createdAt?.toDate ? a.createdAt.toDate().getTime() : new Date(a.createdAt || 0).getTime();
                    const tb = b.createdAt?.toDate ? b.createdAt.toDate().getTime() : new Date(b.createdAt || 0).getTime();
                    return tb - ta;
                });

                notifications.forEach(n => {
                    const typeIcons = { info: '🔔', warning: '⚠️', success: '✅', error: '❌' };
                    list.innerHTML += `
                        <div class="notification-item">
                            <div class="notification-icon">${typeIcons[n.type] || '🔔'}</div>
                            <div class="notification-content">
                                <h4>${escapeHtml(n.title)}</h4>
                                <p>${escapeHtml(n.message)}</p>
                                <span class="notification-time">${n.createdAt ? timeAgo(n.createdAt) : 'Just now'}</span>
                            </div>
                        </div>`;
                });
            } catch (error) {
                console.error('Load notifications error:', error);
            }
        };

        // Init
        if (user) {
            loadEvents();
            loadMyRegistrations();
            loadNotifications();
        }
    </script>
</body>
</html>
